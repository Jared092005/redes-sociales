<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>prueba-rapida</title>
  </head>
  <body class="min-h-screen flex items-center justify-center bg-[#141414]">
    <main
      class="h-180 w-110 flex flex-col items-center bg-[#312f2f] border border-black rounded-2xl"
    >
      <!-- foto de perfil -->
      <span class="h-[20%] w-full flex items-center justify-center"
        ><img
          src="./imagenes/cooked.jpg"
          class="w-30 rounded-full"
          alt="you're cooked lil bro"
      /></span>
      <!-- nombre y país de la persona -->
      <div class="w-full h-[10%] flex flex-col items-center">
        <h1 class="text-white text-center font-semibold text-2xl">
          Jessica Randall
        </h1>
        <p class="text-[#c4f940]">London, United Kingdom</p>
      </div>
      <!-- parrafo debajo del nombre -->
      <span class="h-[7%] w-full flex items-center justify-center"
        ><p class="text-white">"Front-end developer and avid reader."</p></span
      >
      <!-- etiquetas a para links -->
      <section class="h-[62%] w-[90%] flex flex-col items-center gap-4 pt-5">
        <a
          href="#"
          class="text-white bg-[#504e4e] text-center font-semibold h-[15%] w-[90%] rounded-xl p-4.5 hover:bg-[#c4f940] hover:text-black active:bg-[#d7ff70] transition duration-100"
          >Github</a
        >
        <a
          href="#"
          class="text-white bg-[#504e4e] text-center font-semibold h-[15%] w-[90%] rounded-xl p-4.5 hover:bg-[#c4f940] hover:text-black active:bg-[#d7ff70] transition duration-100"
          >Front end mentor</a
        >
        <a
          href="#"
          class="text-white bg-[#504e4e] text-center font-semibold h-[15%] w-[90%] rounded-xl p-4.5 hover:bg-[#c4f940] hover:text-black active:bg-[#d7ff70] transition duration-100"
          >LinkedIn</a
        >
        <a
          href="#"
          class="text-white bg-[#504e4e] text-center font-semibold h-[15%] w-[90%] rounded-xl p-4.5 hover:bg-[#c4f940] hover:text-black active:bg-[#d7ff70] transition duration-100"
          >Twitter</a
        >
        <a
          href="#"
          class="text-white bg-[#504e4e] text-center font-semibold h-[15%] w-[90%] rounded-xl p-4.5 hover:bg-[#c4f940] hover:text-black active:bg-[#d7ff70] transition duration-100"
          >Instagram</a
        >
      </section>
    </main>
  </body>
</html>
